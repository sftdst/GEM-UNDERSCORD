# ══════════════════════════════════════════════════════════════════════════════
# Configuration Nginx — SenArchivage
# Emplacement : /etc/nginx/sites-available/senarchivage.conf
# Activer : ln -s /etc/nginx/sites-available/senarchivage.conf /etc/nginx/sites-enabled/
# ══════════════════════════════════════════════════════════════════════════════

# ── Redirection HTTP → HTTPS ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name senarchive.synapsispharma.com www.senarchive.synapsispharma.com;

    # Certbot / Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name senarchive.synapsispharma.com www.senarchive.synapsispharma.com;

    # ── Racine de l'application (dossier public Laravel) ───────────────────────
    root /var/www/senarchivage/public;
    index index.php;

    # ── SSL — Let's Encrypt (Certbot) ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/senarchive.synapsispharma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/senarchive.synapsispharma.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── En-têtes de sécurité ───────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header X-XSS-Protection          "1; mode=block"                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;

    # ── Taille max upload (doit correspondre à max:102400 dans Laravel = 100 Mo) ─
    client_max_body_size 110M;

    charset utf-8;

    # ── Routage Laravel ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Assets Vite (cache long) ───────────────────────────────────────────────
    location /build {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Storage public (images, documents partagés) ────────────────────────────
    location /storage {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass   unix:/var/run/php/php8.2-fpm.sock;
        # Si PHP-FPM en TCP : fastcgi_pass 127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Timeouts pour les opérations longues (OCR, ZIP)
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # ── Favicon & robots ──────────────────────────────────────────────────────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── Bloquer l'accès aux fichiers cachés ────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/senarchivage.access.log;
    error_log  /var/log/nginx/senarchivage.error.log;
}
